  <text x="112" y="141" text-anchor="middle" fill="#e9f0ff" font-size="13" font-family="monospace">ICON</text>
  <rect x="228" y="220" width="84" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
  <text x="270" y="236" text-anchor="middle" fill="#e9f0ff" font-size="12" font-family="monospace">LOCAL ASSET</text>

  <text x="376" y="156" fill="#f4f7ff" font-size="42" font-weight="700" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">敌怪格</text>
