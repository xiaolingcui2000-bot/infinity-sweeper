  <rect x="376" y="220" width="352" height="2" fill="url(#trim)" opacity="0.95"/>
  <text x="376" y="252" fill="#dbe6ff" font-size="18" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">用于图鉴快速识别、功能分类与页面浏览</text>
  <text x="376" y="278" fill="#94a8cf" font-size="17" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">不是官方原画，重点是离线稳定、视觉统一、查阅更快</text>

  <rect x="42" y="286" rx="15" ry="15" width="122" height="34" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
<text x="103" y="308" text-anchor="middle" fill="#e9f0ff" font-size="16" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">敌怪</text><rect x="180" y="286" rx="15" ry="15" width="122" height="34" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
<text x="241" y="308" text-anchor="middle" fill="#e9f0ff" font-size="16" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">占位</text><rect x="318" y="286" rx="15" ry="15" width="122" height="34" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
<text x="379" y="308" text-anchor="middle" fill="#e9f0ff" font-size="16" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">扰动</text>

  <rect x="42" y="340" width="686" height="84" rx="20" fill="rgba(10,14,22,0.34)" stroke="rgba(255,255,255,0.08)"/>
