<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" role="img" aria-label="敌怪格">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3d1414"/>
    <stop offset="100%" stop-color="#101827"/>
  </linearGradient>
  <linearGradient id="trim" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff8f80"/>
    <stop offset="100%" stop-color="#ffbd80"/>
  </linearGradient>
  <radialGradient id="glow" cx="70%" cy="30%" r="50%">
    <stop offset="0%" stop-color="#ff8f80" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#ff8f80" stop-opacity="0"/>
  </radialGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
  </filter>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
</defs>
<rect width="800" height="480" rx="30" fill="#091019"/>
<g filter="url(#shadow)">
  <rect x="14" y="14" width="772" height="452" rx="28" fill="url(#bg)"/>
  <rect x="14" y="14" width="772" height="452" rx="28" fill="url(#grid)" opacity="0.9"/>
  <circle cx="580" cy="150" r="150" fill="url(#glow)"/>
  <rect x="26" y="26" width="748" height="428" rx="24" fill="none" stroke="rgba(255,255,255,0.10)"/>
  <rect x="34" y="34" width="732" height="54" rx="18" fill="rgba(10,14,22,0.38)" stroke="rgba(255,255,255,0.09)"/>
