  <text x="62" y="418" fill="#9fb2d6" font-size="16" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif">建议移动端点击图片可放大查看，桌面端可悬停查看细节。</text>

  <rect x="652" y="352" width="94" height="28" rx="14" fill="rgba(255,255,255,0.08)"/>
  <text x="699" y="371" text-anchor="middle" fill="#e9f0ff" font-size="13" font-family="monospace">OFFLINE</text>
